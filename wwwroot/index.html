<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CHECKER</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-weight-scale"></i> BMI CHECKER</h1>
        
        <form action="/api/bmi/calculate" method="post">
            <div class="input-group">
                <label><i class="fas fa-venus-mars"></i> Gender</label>
                <select name="gender">
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-group">
                <label><i class="fas fa-calendar"></i> Age</label>
                <input type="number" name="age" min="1" max="120" placeholder="Input age">
            </div>

            <div class="input-group">
                <label><i class="fas fa-weight-hanging"></i> Weight (kg)</label>
                <input type="number" name="weight" step="0.1" min="1" placeholder="kg">
            </div>

            <div class="input-group">
                <label><i class="fas fa-ruler-vertical"></i> Height (cm)</label>
                <input type="number" name="height" step="0.1" min="1" placeholder="cm">
            </div>

            <button type="submit">
                <i class="fas fa-calculator"></i> Calculate
            </button>
        </form>
    </div>
</body>
</html>
